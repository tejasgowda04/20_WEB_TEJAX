<div style="font-family:Inter,Arial,sans-serif;background:#0a0d1a;color:#e2e8f0;padding:2rem;max-width:600px;margin:0 auto">
  <div style="text-align:center;margin-bottom:1.5rem"><span style="font-size:1.5rem;font-weight:800">🎓 EduEvent</span></div>
  <div style="background:#0f1629;border:1px solid #1e293b;border-radius:12px;padding:1.5rem">
    <h2 style="color:#10b981;margin-bottom:1rem">✅ Account Approved!</h2>
    <p>Hi <strong>{{ user.name }}</strong>,</p>
    <p>Your EduEvent account has been approved! You can now log in and access the {{ user.get_role_display }} portal.</p>
    <a href="{{ site_url }}/auth/login/?role={{ user.role }}" style="display:inline-block;background:#667eea;color:white;padding:.6rem 2rem;border-radius:8px;text-decoration:none;margin-top:1rem">🔑 Login Now</a>
  </div>
  <p style="text-align:center;font-size:.75rem;color:#64748b;margin-top:1rem">{{ college_name }}</p>
</div>
